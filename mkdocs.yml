site_name: Pyue

nav:
    - Home: index.md
    - Installation: installation.md
    - Quick Start: quickstart.md
    - Advanced Usage: advanced_usage.md
    - API reference: api_reference.md

theme:
    name: "material"
    language: en
    palette:
        - scheme: slate
          primary: red
          accent: lime
          toggle:
            icon: material/lightbulb
            name: Switch to light mode

        - scheme: default
          primary: red
          accent: lime
          toggle:
            icon: material/lightbulb-outline
            name: Switch to dark mode
    features:
        - content.code.copy
        - navigation.tracking
        - navigation.footer
        - navigation.path
        - navigation.prune
        - toc.follow
        - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - admonition
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji 
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.tasklist:
        custom_checkbox: true
  - attr_list
  - tables
        
plugins:
- search
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        options:
          docstring_style: google
- autorefs
- privacy
- offline

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Shkvaldev/pyue
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@dilet4nt765
